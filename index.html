<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaxmat Klubi CRM | Stabil v2.0</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Dependencies (face-api loaded lazily) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #fbbf24;
            --primary-light: #fef3c7;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(15, 23, 42, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Essential Layout */
        #app {
            display: flex;
            min-height: 100vh;
        }

        #sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: var(--glass);
            border-right: 1px solid var(--border);
            backdrop-filter: blur(20px);
            z-index: 1000;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        #main {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            width: calc(100% - 280px);
        }

        @media (max-width: 1024px) {
            #sidebar {
                transform: translateX(-100%);
                width: 300px;
            }

            #sidebar.active {
                transform: translateX(0);
            }

            #main {
                margin-left: 0;
                width: 100%;
                padding: 1rem;
                padding-top: 5rem;
            }

            .mobile-header {
                display: flex !important;
            }
        }

        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4.5rem;
            background: var(--glass);
            border-bottom: 1px solid var(--border);
            z-index: 999;
            align-items: center;
            padding: 0 1.5rem;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        /* Sidebar Nav */
        .nav-link {
            padding: 0.9rem 1.5rem;
            margin: 0.2rem 1rem;
            border-radius: 1rem;
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary);
        }

        .nav-link.active {
            box-shadow: inset 0 0 10px rgba(251, 191, 36, 0.1);
        }

        /* UI Blocks */
        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-ghost {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            border-radius: 0.6rem;
        }

        /* Forms */
        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 1rem;
            color: #fff;
            margin-top: 0.5rem;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            margin-top: 1rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.1);
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-dim);
            font-weight: 500;
            font-size: 0.9rem;
        }

        td {
            padding: 1rem;
            border-top: 1px solid var(--border);
        }

        /* FaceID UI */
        .face-camera-wrap {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 2rem;
            overflow: hidden;
            position: relative;
            background: #000;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            min-height: 420px;
        }

        .face-camera-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            min-height: 420px;
            display: block;
            /* Kamera ravshanligini oshirish */
            filter: brightness(1.1) contrast(1.05);
        }

        .face-oval {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 300px;
            border: 3px solid var(--primary);
            border-radius: 50%;
            pointer-events: none;
            /* Qora overlay olib tashlandi - kamera endi ravshan ko'rinadi */
            box-shadow: 0 0 0 1500px rgba(0, 0, 0, 0.25), inset 0 0 20px rgba(251, 191, 36, 0.15);
            animation: ovalPulse 2s ease-in-out infinite;
        }

        @keyframes ovalPulse {

            0%,
            100% {
                border-color: var(--primary);
                box-shadow: 0 0 0 1500px rgba(0, 0, 0, 0.25), 0 0 15px rgba(251, 191, 36, 0.4);
            }

            50% {
                border-color: #fef3c7;
                box-shadow: 0 0 0 1500px rgba(0, 0, 0, 0.25), 0 0 30px rgba(251, 191, 36, 0.7);
            }
        }

        /* FaceID loading bar */
        #face-load-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #fbbf24, #f59e0b, #fbbf24);
            background-size: 200% 100%;
            animation: barSlide 1.5s linear infinite;
            z-index: 9998;
        }

        @keyframes barSlide {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        /* Badge */
        .badge {
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        /* Smooth Transition */
        .animate-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Diagnosis Panel Styles */
        .diag-panel {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border);
            border-radius: 1rem;
            font-size: 0.8rem;
            text-align: left;
            color: var(--text-dim);
            backdrop-filter: blur(10px);
        }
        .diag-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .diag-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 2px;
        }
        .status-val {
            color: var(--text);
            font-weight: 500;
        }
        .status-val.true { color: var(--success); }
        .status-val.false { color: var(--danger); }

        /* Checklist Styles */
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }
        .checklist-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }
    </style>
</head>

<body>

    <div id="loader"
        style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div class="spinner"></div>
        <p style="margin-top:1.5rem; color:var(--text-dim);">Tizim barqarorlashtirilmoqda...</p>
    </div>

    <div id="app" style="display:none;">

        <!-- Auth View -->
        <div id="view-auth"
            style="display:none; min-height:100vh; align-items:center; justify-content:center; padding:1.5rem;">
            <div class="card" style="width:100%; max-width:420px; text-align:center;">
                <div
                    style="width:80px; height:80px; margin:0 auto 1.5rem; background:linear-gradient(135deg,#fbbf24,#f59e0b); border-radius:1.2rem; display:flex; align-items:center; justify-content:center; font-size:2.2rem; box-shadow:0 8px 32px rgba(251,191,36,0.3);">
                    ♟️</div>
                <h2 style="margin-bottom:0.5rem;">Xush kelibsiz</h2>
                <p style="color:var(--text-dim); margin-bottom:2rem;">Admin panelga kirish</p>
                <div style="text-align:left;">
                    <label>Login</label><input type="text" id="auth-user" class="form-control" placeholder="admin">
                    <label style="margin-top:1rem; display:block;">Parol</label><input type="password" id="auth-pass"
                        class="form-control" placeholder="••••">
                    <button onclick="Engine.login()" class="btn btn-primary"
                        style="width:100%; margin-top:2rem; justify-content:center;">Tizimga kirish</button>
                </div>
            </div>
        </div>

        <!-- Main Shell -->
        <div id="view-shell" style="display:none; width:100%;">
            <header class="mobile-header">
                <button class="btn btn-ghost" onclick="Engine.toggleSidebar()"><i data-lucide="menu"></i></button>
                <h3 style="font-weight:700; color:var(--primary);">SHAXMAT CRM</h3>
                <div style="width:40px;"></div>
            </header>

            <aside id="sidebar">
                <div
                    style="padding:2rem; display:flex; align-items:center; gap:1rem; border-bottom:1px solid var(--border);">
                    <div
                        style="width:42px; height:42px; background:linear-gradient(135deg,#fbbf24,#f59e0b); border-radius:0.8rem; display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0;">
                        ♟️</div>
                    <h2 style="font-size:1.4rem; font-weight:800; tracking:-0.02em;">CHESS CLUB</h2>
                </div>
                <nav id="nav-list" style="flex:1; padding-top:1rem; overflow-y:auto;">
                    <!-- Nav Items Rendered Here -->
                </nav>
                <div style="padding:1.5rem; border-top:1px solid var(--border);">
                    <div class="nav-link" onclick="Engine.logout()" style="margin:0; color:var(--danger);"><i
                            data-lucide="log-out"></i> Chiqish</div>
                </div>
            </aside>

            <main id="main">
                <div id="render-target" class="animate-in"></div>
            </main>
        </div>
    </div>

    <script>
        // --- CONFIG & CONSTANTS ---
        const TG_BOT_TOKEN = '8718819420:AAEsc4a5H_UcfDetGFoHh3tzXHOJAIRCD3s';
        const TG_URL = `https://api.telegram.org/bot${TG_BOT_TOKEN}`;

        // --- DATABASE AGENT (SUPABASE SYNCED) ---
        const SUPABASE_URL = 'https://wfheqfctwhmeldngvafi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_o8_4YuUyllDnnwicyphCFQ_h5edg8co';
        let supabaseClient = null;
        if (typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        const DB = {
            local: null,
            async init() {
                let validData = null;
                try {
                    if (supabaseClient) {
                        const { data, error } = await supabaseClient.from('db_state').select('data').eq('id', 'main').single();
                        if (data && data.data && data.data.meta) {
                            validData = data.data;
                        }
                    }
                } catch (e) { console.warn('Supabase fetch error, fallback to local', e); }

                if (validData) {
                    this.local = validData;
                    localStorage.setItem('chess_stabil_db', JSON.stringify(this.local));
                } else {
                    const cache = localStorage.getItem('chess_stabil_db');
                    if (cache && JSON.parse(cache).meta) {
                        this.local = JSON.parse(cache);
                        if (supabaseClient) supabaseClient.from('db_state').upsert({ id: 'main', data: this.local }).then();
                    } else {
                        this.local = {
                            meta: { lastResetMonth: new Date().getMonth(), lastTgUpdateId: 0 },
                            admins: [
                                { id: 'a1', user: 'boshadmin', pass: '123', role: 'BOSHADMIN' },
                                { id: 'a2', user: 'admin', pass: '123', role: 'ADMIN' }
                            ],
                            students: [],
                            groups: [],
                            group_members: [],
                            sessions: [],
                            attendance: [],
                            absences: [],
                            coin_ledger: [],
                            requests: [],
                            settings: { monthlyLessons: 12, lessonCost: 50000, boshadminTgChatId: '' },
                            transactions: []
                        };
                        if (supabaseClient) {
                            supabaseClient.from('db_state').upsert({ id: 'main', data: this.local }).then();
                        }
                    }
                }
                this.checkMonthReset();
            },
            get() {
                if (!this.local) this.local = JSON.parse(localStorage.getItem('chess_stabil_db'));
                return this.local;
            },
            save(data) {
                if (!data.meta) data.meta = {};
                data.meta.lastModified = Date.now();
                this.local = data;
                localStorage.setItem('chess_stabil_db', JSON.stringify(data));
                if (supabaseClient) {
                    supabaseClient.from('db_state').upsert({ id: 'main', data }).then();
                }
            },
            async sync() {
                if (!supabaseClient) return;
                try {
                    const { data } = await supabaseClient.from('db_state').select('data').eq('id', 'main').single();
                    if (data && data.data && data.data.meta) {
                        const rMod = data.data.meta.lastModified || 0;
                        const lMod = this.local?.meta?.lastModified || 0;
                        if (rMod > lMod) {
                            this.local = data.data;
                            localStorage.setItem('chess_stabil_db', JSON.stringify(this.local));
                            if (!Swal.isVisible() && Engine.user) {
                                const activeLink = document.querySelector('.nav-link.active');
                                if (activeLink) Engine.navigate(activeLink.dataset.id);
                            }
                        }
                    }
                } catch (e) { }
            },
            // Mavjud DB ga settings.boshadminTgChatId yo'q bo'lsa qo'shamiz
            migrate() {
                const db = this.get();
                let changed = false;
                if (!db.meta) { db.meta = { lastResetMonth: 0, lastTgUpdateId: 0 }; changed = true; }
                if (!db.meta.lastTgUpdateId) { db.meta.lastTgUpdateId = 0; changed = true; }
                if (!db.group_members) { db.group_members = []; changed = true; }
                if (!db.sessions) { db.sessions = []; changed = true; }
                if (!db.absences) { db.absences = []; changed = true; }
                if (!db.coin_ledger) { db.coin_ledger = []; changed = true; }

                if (changed && db.students) {
                    db.students.forEach(s => {
                        if (s.groupId && !db.group_members.find(x => x.studentId === s.id && x.groupId === s.groupId)) {
                            db.group_members.push({ id: crypto.randomUUID(), studentId: s.id, groupId: s.groupId });
                        }
                    });
                }

                if (!db.settings.boshadminTgChatId) { db.settings.boshadminTgChatId = ''; changed = true; }
                // boshadmin ni yangilaymiz
                const ba = db.admins.find(a => a.role === 'BOSHADMIN');
                if (ba && ba.user === 'root') { ba.user = 'boshadmin'; ba.pass = '123'; changed = true; }
                if (changed) this.save(db);
            },
            checkMonthReset() {
                const db = this.get();
                const currentMonth = new Date().getMonth();
                if (db.meta.lastResetMonth !== currentMonth) {
                    db.students.forEach(s => { s.balance = 0; s.monthlyPoints = 0; });
                    db.meta.lastResetMonth = currentMonth;
                    this.save(db);
                }
            }
        };

        // --- TELEGRAM BOT (LONG-POLLING) ---
        const TGBot = {
            async poll() {
                const db = DB.get();
                try {
                    const res = await fetch(`${TG_URL}/getUpdates?offset=${db.meta.lastTgUpdateId + 1}`);
                    const json = await res.json();
                    if (json.ok && json.result.length > 0) {
                        for (let update of json.result) {
                            db.meta.lastTgUpdateId = update.update_id;
                            if (update.message && update.message.text) {
                                await this.handleMessage(update.message, db);
                            }
                            if (update.callback_query) {
                                await this.handleCallback(update.callback_query, db);
                            }
                        }
                        DB.save(db);
                    }
                } catch (e) { }
            },
            async handleMessage(msg, db) {
                const chatId = msg.chat.id;
                const text = msg.text.trim();

                if (text === '/start') {
                    this.send(chatId, "Iltimos, farzandingizning 6 xonali ID (studentCode) sini kiriting:");
                    return;
                }
                const s = db.students.find(x => x.studentCode === text);
                if (s) {
                    this.send(chatId, `Ushbu o'quvchi ${s.name} ${s.surname} mi?`, JSON.stringify({
                        inline_keyboard: [[
                            { text: "✅ HA", callback_data: `C_YES_${s.id}` },
                            { text: "❌ YO'Q", callback_data: `C_NO` }
                        ]]
                    }));
                } else {
                    this.send(chatId, "XATO! Bunday ID raqamli o'quvchi topilmadi. Qaytadan kiriting yoki adminga murojaat qiling.");
                }
            },
            async handleCallback(cb, db) {
                const chatId = cb.message.chat.id;
                const data = cb.data;
                if (data.startsWith('C_YES_')) {
                    const sid = data.split('_')[2];
                    const s = db.students.find(x => x.id === sid);
                    if (s) {
                        if (!s.tgChatIds) s.tgChatIds = [];
                        if (!s.tgChatIds.includes(chatId)) s.tgChatIds.push(chatId);
                        this.send(chatId, `✅ Muvaffaqiyatli! ${s.name} ${s.surname} profiliga bog'landingiz.`);
                    }
                } else if (data === 'C_NO') {
                    this.send(chatId, "Iltimos, farzandingizning to'g'ri ID sini qaytadan kiriting:");
                }
            },
            async send(chatId, text, reply_markup = null) {
                const body = { chat_id: chatId, text, parse_mode: 'HTML' };
                if (reply_markup) body.reply_markup = reply_markup;
                await fetch(`${TG_URL}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
            },
            async notifyAttendance(studentId, status, db, extraText = '') {
                const s = db.students.find(x => x.id === studentId);
                if (!s || !s.tgChatIds || s.tgChatIds.length === 0) return;

                const pts = status === 'KELDI' ? 5 : status === 'KECHIKDI' ? 3 : 0;
                let text = `♟️ <b>DAVOMAT</b>\n👤 O'quvchi: ${s.name} ${s.surname}\n`;
                if (status === 'KELMADI') {
                    text += `📍 Holat: <b>KELMADI</b>\n💡 Coin: +0\n${extraText}`;
                } else {
                    const tStr = new Date().toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
                    text += `⏰ Vaqt: ${tStr}\n📍 Holat: <b>${status}</b>\n🏆 Coin: +${pts}\n`;
                }

                for (let cid of s.tgChatIds) {
                    await this.send(cid, text);
                }
            }
        };

        // --- CORE ENGINE ---
        const Engine = {
            user: null,
            views: [
                { id: 'dashboard', label: 'Bosh sahifa', icon: 'layout-dashboard', role: 'ALL' },
                { id: 'students', label: 'O\'quvchilar', icon: 'users', role: 'ALL' },
                { id: 'groups', label: 'Guruhlar', icon: 'book-open', role: 'ALL' },
                { id: 'attendance', label: 'Davomat', icon: 'calendar-check', role: 'ALL' },
                { id: 'absent', label: 'Kelmaganlar', icon: 'user-x', role: 'ALL' },
                { id: 'frozen', label: 'Muzlatilganlar', icon: 'snowflake', role: 'ALL' },
                { id: 'rating', label: 'Reyting', icon: 'trophy', role: 'ALL' },
                { id: 'payments', label: 'To\'lovlar', icon: 'banknote', role: 'ALL' },
                { id: 'requests', label: 'So\'rovlar', icon: 'clipboard-list', role: 'BOSHADMIN' },
                { id: 'settings-oy', label: 'Oy sozlamalari', icon: 'calendar-days', role: 'BOSHADMIN' },
                { id: 'settings-pass', label: 'Sozlamalar', icon: 'key-round', role: 'ALL' },
                { id: 'telegram', label: 'Telegram Xabar', icon: 'send', role: 'BOSHADMIN' }
            ],

            faceModelsLoaded: false,
            faceModelsLoading: false,

            async init() {
                await DB.init();
                DB.migrate(); // Eski DB ni yangi formatga o'tkazish

            async loadFaceModels() {
                if (this.faceModelsLoaded) return true;
                if (this.faceModelsLoading) return false;
                this.faceModelsLoading = true;

                // face-api.js kutubxonasini dinamik yuklash
                await new Promise((resolve, reject) => {
                    const s = document.createElement('script');
                    s.src = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js';
                    s.onload = resolve;
                    s.onerror = reject;
                    document.head.appendChild(s);
                });

                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)

                this.faceModelsLoaded = true;
                this.faceModelsLoading = false;
                return true;

        // --- FACE ID CORE ENGINE (REBUILT FOR RELIABILITY) ---
        const FaceID = {
            stream: null,

            candidates: [],
            currentSessionId: null,
            lastCapturedBase64: null,

            updateDiag(key, val, isBool = false) {
                const el = document.getElementById(`diag-${key}`);
                if (!el) return;
                el.innerText = val === null || val === undefined ? '-' : val;
                if (isBool) {
                    el.classList.toggle('true', val === true || val === 'true');
                    el.classList.toggle('false', val === false || val === 'false');
                }
            },

            async start() {
                const gid = document.getElementById('att-gid')?.value;
                const date = document.getElementById('att-date')?.value;
                if (!gid || !date) return Swal.fire('Xato', 'Guruh va sanani tanlang', 'error');

                const g = db.groups.find(x => x.id === gid);
                let session = db.sessions.find(x => x.groupId === gid && x.date === date);
                if (!session) {
                    session = { id: crypto.randomUUID(), groupId: gid, date: date, startTime: g.start || '09:00', endTime: g.endTime || '23:59', isClosed: false };
                    db.sessions.push(session);
                    DB.save(db);
                }
                if (session.isClosed && Engine.user.role !== 'BOSHADMIN') return Swal.fire('Taqiq', 'Bu dars yakunlangan!', 'warning');
                
                this.currentSessionId = session.id;

                // 1) Diagnosis Basics
                this.updateDiag('https', location.protocol === 'https:', true);
                this.updateDiag('iframe', window.self !== window.top, true);
                if (window.self !== window.top) document.getElementById('iframe-warn').style.display = 'block';

                // 2) Candidates Logic
                const members = db.group_members.filter(m => m.groupId === gid);
                const students = db.students.filter(s => members.some(m => m.studentId === s.id) && s.status === 'active');
                
                // User requirement: facePhoto != null and facePhoto != ""
                // In our schema faceImg is the base64 photo
                this.candidates = students.filter(s => s.faceImg && s.faceImg.length > 100);
                this.updateDiag('candidates', this.candidates.length);
                document.getElementById('chk-candidates').checked = this.candidates.length > 0;

                const noFaceList = document.getElementById('no-face-list');
                if (this.candidates.length === 0) {
                    noFaceList.style.display = 'block';
                    const noFaceStudents = students.filter(s => !s.faceImg || s.faceImg.length < 100);
                    document.getElementById('no-face-names').innerHTML = noFaceStudents.length > 0 ? 
                        noFaceStudents.map(s => `• ${s.name} ${s.surname} (${s.studentCode || 'no code'}) <button onclick="FaceID.stop(); Actions.viewProfile('${s.id}')" class="btn btn-ghost btn-sm" style="padding:2px 5px; font-size:10px;">FaceID o‘tkazish</button>`).join('<br>') : 
                        'Guruhda o‘zi o‘quvchi yo‘q';
                } else {
                    noFaceList.style.display = 'none';
                }

                // Show Scan View
                document.getElementById('att-setup').style.display = 'none';
                document.getElementById('att-scan').style.display = 'block';
                document.getElementById('manual-fallback').style.display = 'none';
                this.updateDiag('cam', this.mode);

                // 3) Camera Start with Fallbacks
                const vid = document.getElementById('att-video');
                const statusEl = document.getElementById('att-status');
                statusEl.innerHTML = '<span style="color:var(--primary)">Kamera ishga tushmoqda...</span>';

                const constraints = [
                    { video: { facingMode: this.mode, width: { ideal: 1280 }, height: { ideal: 720 } } },
                    { video: { facingMode: this.mode } },
                    { video: true }
                ];

                let success = false;
                for (let c of constraints) {
                    try {
                        console.log("Trying constraint:", c);
                        this.stream = await navigator.mediaDevices.getUserMedia(c);
                        vid.srcObject = this.stream;
                        await vid.play();
                        
                        // Wait for videoWidth > 0
                        const vw = await new Promise((resolve) => {
                            let attempts = 0;
                            const check = setInterval(() => {
                                attempts++;
                                if (vid.videoWidth > 0) { clearInterval(check); resolve(vid.videoWidth); }
                                if (attempts > 25) { clearInterval(check); resolve(0); } // 2500ms fallback
                            }, 100);
                        });

                        if (vw > 0) {
                            success = true;
                            this.updateDiag('res', `${vid.videoWidth}x${vid.videoHeight}`);
                            this.updateDiag('tracks', `${this.stream.getTracks().length} (${this.stream.getTracks()[0].readyState})`);
                            document.getElementById('chk-video').checked = true;
                            break;
                        } else {
                            // Stop track and try next fallback
                            this.stream.getTracks().forEach(t => t.stop());
                        }
                    } catch (e) {
                        console.warn("Constraint failed:", e);
                        this.updateDiag('error', e.name + ': ' + e.message);
                    }
                }

                if (!success) {
                    statusEl.innerHTML = '<span style="color:var(--danger)">Kamera yoqilmadi!</span>';
                    return;
                }

                statusEl.innerHTML = '<span style="color:var(--success)">Kamera tayyor.</span>';
                this.active = true;

                // Update Camera Permission State
                try {
                    const perm = await navigator.permissions.query({ name: 'camera' });
                    this.updateDiag('perm', perm.state);
                    perm.onchange = () => this.updateDiag('perm', perm.state);
                } catch(e) { this.updateDiag('perm', 'unknown'); }

                // Load AI if needed
                if (!Engine.faceModelsLoaded) {
                    statusEl.innerHTML = '<span style="color:var(--warning)">AI yuklanmoqda...</span>';
                    await Engine.loadFaceModels();
                    statusEl.innerHTML = '<span style="color:var(--success)">Kamera tayyor. AI Faol.</span>';
                }
            },

            async identify() {
                if (!this.active || !this.stream) return;
                
                const btn = document.getElementById('btn-identify');
                const statusEl = document.getElementById('att-status');
                const nameEl = document.getElementById('att-name');
                const vid = document.getElementById('att-video');

                btn.disabled = true;
                statusEl.innerHTML = '<span style="color:var(--primary)">O‘quvchi aniqlanmoqda...</span>';
                nameEl.innerText = '';
                this.updateDiag('last-req', new Date().toLocaleTimeString());
                document.getElementById('manual-fallback').style.display = 'none';

                try {
                    // Capture Frame
                    const canvas = document.createElement('canvas');
                    canvas.width = vid.videoWidth;
                    canvas.height = vid.videoHeight;
                    const ctx = canvas.getContext('2d');
                    // Mirror flip if using front camera
                    if (this.mode === 'user') {
                        ctx.translate(canvas.width, 0);
                        ctx.scale(-1, 1);
                    }
                    ctx.drawImage(vid, 0, 0);
                    const base64 = canvas.toDataURL('image/jpeg', 0.85);
                    this.lastCapturedBase64 = base64;

                    // 4) FACE DETECTION GATE
                    const detection = await faceapi.detectSingleFace(vid, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.5 }));
                    if (!detection) {
                        statusEl.innerHTML = '<span style="color:var(--danger)">YUZ TOPILMADI. Iltimos kameraga to‘g‘ri qarang.</span>';
                        document.getElementById('chk-no-face').checked = true;
                        btn.disabled = false;
                        return;
                    }
                    document.getElementById('chk-no-face').checked = false; // Reset if found
                    document.getElementById('chk-identify').checked = true;

                    // 5) IDENTIFY REQUEST PAYLOAD
                    const payload = {
                        targetImageBase64: base64,
                        candidates: this.candidates.map(s => ({
                            studentId: s.id,
                            facePhotoBase64: s.faceImg
                        }))
                    };

                    this.updateDiag('last-res', 'Sending identify request...');

                    // We use the LOCAL face-api logic as the "backend" but structured for the requirement
                    // If a real webhook exists, we'd fetch(URL, {body: JSON.stringify(payload)})
                    const result = await this.mockIdentifyRequest(payload);
                    this.updateDiag('last-res', JSON.stringify(result, null, 2));

                    if (result.match && result.studentId) {
                        const student = this.candidates.find(s => s.id === result.studentId);
                        if (student) {
                            this.processMatch(student);
                        } else {
                            this.processUnknown();
                        }
                    } else {
                        this.processUnknown();
                    }
                } catch (e) {
                    console.error(e);
                    this.updateDiag('error', e.name + ': ' + e.message);
                    this.updateDiag('last-res', 'ERROR: ' + e.message);
                    this.showManualFallback();
                }

                btn.disabled = false;
            },

            // Mocking the behavior of a remote Identify API using local face-api
            async mockIdentifyRequest(payload) {
                // Simulate network latency
                await new Promise(r => setTimeout(r, 600));

                const vid = document.getElementById('att-video');
                const fullDet = await faceapi.detectSingleFace(vid).withFaceLandmarks().withFaceDescriptor();
                
                if (!fullDet) return { match: false, status: 'UNKNOWN', error: 'Face lost during processing' };

                let bestMatch = null;
                let minDistance = 0.6; // Threshold

                for (let s of this.candidates) {
                    if (!s.faceData) continue;
                    const distance = faceapi.euclideanDistance(fullDet.descriptor, new Float32Array(s.faceData));
                    if (distance < minDistance) {
                        minDistance = distance;
                        bestMatch = s;
                    }
                }

                if (bestMatch && minDistance < 0.55) {
                    return { match: true, studentId: bestMatch.id, confidence: (1 - minDistance).toFixed(2) };
                } else {
                    return { match: false, status: 'UNKNOWN' };
                }
            },

            processMatch(student) {
                const statusEl = document.getElementById('att-status');
                const nameEl = document.getElementById('att-name');
                const db = DB.get();
                const session = db.sessions.find(s => s.id === this.currentSessionId);

                // 6) STATUS DECISION LOGIC
                // Rules: now <= start => KELDI; start < now <= end => KECHIKDI; now > end => KELMADI
                const now = new Date();
                const nowTimeStr = now.toTimeString().slice(0, 5); // "HH:MM" format
                
                let status = 'KELDI';
                if (nowTimeStr > session.endTime) status = 'KELMADI';
                else if (nowTimeStr > session.startTime) status = 'KECHIKDI';

                this.updateDiag('last-decision', status);
                document.getElementById('chk-match').checked = true;

                const existing = db.attendance.find(a => a.sessionId === session.id && a.studentId === student.id);
                if (existing) {
                    statusEl.innerHTML = `<span style="color:var(--warning)">${student.name} avval belgilangan!</span>`;
                    nameEl.innerText = student.name + ' ' + student.surname;
                    return;
                }

                statusEl.innerHTML = `<span style="color:var(--success)">✅ TANILDI: ${status}</span>`;
                nameEl.innerText = student.name + ' ' + student.surname;

                // 7) SAVE ATTENDANCE
                Actions.saveMark(session.id, student.id, status, true, 'FaceID');
                document.getElementById('chk-saved').checked = true;
                confetti({ particleCount: 50, spread: 80, origin: { y: 0.7 } });
            },

            processUnknown() {
                const statusEl = document.getElementById('att-status');
                statusEl.innerHTML = '<span style="color:var(--danger)">Tanimadim (UNKNOWN)</span>';
                this.updateDiag('last-decision', 'UNKNOWN');
                document.getElementById('chk-unknown').checked = true;
                this.showManualFallback();
            },

            showManualFallback() {
                const zone = document.getElementById('manual-fallback');
                const sel = document.getElementById('manual-student-select');
                const db = DB.get();

            confirmManual() {
                const sid = document.getElementById('manual-student-select').value;
                if (!sid) return;
                const student = DB.get().students.find(s => s.id === sid);
                if (student) this.processMatch(student);
                document.getElementById('manual-fallback').style.display = 'none';
            },

            toggleCam() {
                this.mode = this.mode === 'user' ? 'environment' : 'user';

                this.start();
            },

            stop() {
                this.active = false;
                if (this.stream) {

            async enroll(sid) {

                const startCam = async (mode) => {

                const { value: ok, isConfirmed } = await Swal.fire({

                            <div class="face-oval"></div>
                            <button type="button" id="cam-switch" class="btn btn-ghost" style="position:absolute; bottom:1rem; right:1rem; padding:0.5rem; z-index:1000;"><i data-lucide="refresh-cw"></i></button>
                        </div>
                        <p id="en-status" style="margin-top:1rem; font-size:1.1rem; font-weight:bold; color:var(--warning);">Yuz kutilmoqda...</p>
                        <p style="color:var(--text-dim); font-size:0.9rem; margin-top:0.5rem;">Sifatli tanish uchun boshingizni biroz harakatlantiring</p>`,
                    confirmButtonText: '✅ Saqlash (Tasdiqlash)',
                    showCancelButton: true,
                    cancelButtonText: 'Bekor',
                    didOpen: () => {
                        lucide.createIcons();
                        document.getElementById('cam-switch').onclick = () => {
                            curFacing = curFacing === 'user' ? 'environment' : 'user';
                            startCam(curFacing);
                        };
                        startCam(curFacing);

                        const v = document.getElementById('en-vid');
                        const st = document.getElementById('en-status');

                        const loop = async () => {
                            if (!enrollActive) return;
                            try {
                                if (v.videoWidth && !v.paused && enDescriptors.length < 5) {
                                    const vInfo = await faceapi.detectSingleFace(v).withFaceLandmarks().withFaceDescriptor();
                                    if (vInfo) {
                                        enDescriptors.push(vInfo.descriptor);
                                        if(!lastDetImg) {
                                            const canvas = document.createElement('canvas');
                                            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
                                            canvas.getContext('2d').drawImage(v, 0, 0);
                                            const faces = await faceapi.extractFaces(canvas, [vInfo.detection.box]);
                                            lastDetImg = faces[0]?.toDataURL();
                                        }

                                        if (enDescriptors.length >= 5) {
                                            st.innerHTML = `✅ Tayyor! (5/5)<br><small style="color:var(--text-dim)">"Saqlash" ni bosing</small>`;
                                            st.style.color = 'var(--success)';
                                        } else {
                                            st.innerHTML = `🧬 Skanerlanmoqda... (${enDescriptors.length}/5)`;
                                        }
                                    } else {
                                        st.innerHTML = `📸 Yuz kutilmoqda...`;
                                        st.style.color = 'var(--warning)';
                                    }
                                }
                            } catch (e) { }
                            if (enrollActive) setTimeout(loop, 100);
                        };
                        v.addEventListener('playing', loop, { once: true });
                    },
                    willClose: () => {
                        enrollActive = false;
                        if (enStream) enStream.getTracks().forEach(t => t.stop());
                    },
                    preConfirm: async () => {
                        if (enDescriptors.length < 5) {
                            Swal.showValidationMessage('❌ Skanerlash yakunlanmadi!');
                            return false;
                        }
                        let meanDesc = new Float32Array(128);
                        for (let i = 0; i < 128; i++) {
                            let sum = 0;
                            for (let d = 0; d < enDescriptors.length; d++) { sum += enDescriptors[d][i]; }
                            meanDesc[i] = sum / enDescriptors.length;
                        }
                        return { data: Array.from(meanDesc), img: lastDetImg };
                    }
                });

                if (enStream) enStream.getTracks().forEach(t => t.stop());

                if (isConfirmed && ok) {
                    const db = DB.get();
                    const s = db.students.find(x => x.id === sid);
                    if (s) {
                        s.faceData = ok.data;
                        s.faceImg = ok.img;
                        DB.save(db);
                        Swal.fire('✅ Muvaffaqiyatli', 'FaceID saqlandi!', 'success').then(() => Engine.navigate('students'));
                    }
                }
            }
        };

        window.onload = () => Engine.init();
    </script>
</body>
