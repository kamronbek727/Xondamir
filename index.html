<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaxmat Klubi CRM | Stabil v2.0</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Dependencies (face-api loaded lazily) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #fbbf24;
            --primary-light: #fef3c7;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(15, 23, 42, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(251, 191, 36, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* Essential Layout */
        #app {
            display: flex;
            min-height: 100vh;
        }

        #sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: var(--glass);
            border-right: 1px solid var(--border);
            backdrop-filter: blur(20px);
            z-index: 1000;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        #main {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            width: calc(100% - 280px);
        }

        /* Mobile First adjustments */
        @media (max-width: 1024px) {
            #sidebar {
                transform: translateX(-100%);
                width: 280px;
            }

            #sidebar.active {
                transform: translateX(0);
                box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
            }

            #main {
                margin-left: 0;
                width: 100%;
                padding: 1rem;
                padding-top: 5.5rem;
            }

            .mobile-header {
                display: flex !important;
            }

            /* Form inputs 100% width on mobile */
            .form-control,
            .btn {
                width: 100% !important;
            }

            /* Responsive Tables to Card List */
            .table-container table,
            .table-container thead,
            .table-container tbody,
            .table-container th,
            .table-container td,
            .table-container tr {
                display: block;
            }

            .table-container thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            .table-container tr {
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--border);
                margin-bottom: 1rem;
                border-radius: 1rem;
                padding: 0.5rem;
            }

            .table-container td {
                border: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                position: relative;
                padding-left: 45%;
                min-height: 3rem;
                display: flex;
                align-items: center;
                text-align: right;
                justify-content: flex-end;
                flex-wrap: wrap;
            }

            .table-container td:last-child {
                border-bottom: 0;
            }

            .table-container td:before {
                content: attr(data-label);
                position: absolute;
                left: 1rem;
                width: 40%;
                text-align: left;
                font-weight: 600;
                color: var(--text-dim);
                font-size: 0.85rem;
            }

            /* FaceID Camera on Mobile */
            .face-camera-wrap {
                height: 70vh !important;
                max-width: 100% !important;
                border-radius: 1rem !important;
            }

            .face-camera-wrap video {
                height: 100% !important;
            }

            #btn-identify {
                position: sticky;
                bottom: 1rem;
                z-index: 10;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                height: 60px;
            }
        }

        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4.5rem;
            background: var(--glass);
            border-bottom: 1px solid var(--border);
            z-index: 999;
            align-items: center;
            padding: 0 1.5rem;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        /* Sidebar Nav */
        .nav-link {
            padding: 0.9rem 1.5rem;
            margin: 0.2rem 1rem;
            border-radius: 1rem;
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary);
        }

        .nav-link.active {
            box-shadow: inset 0 0 10px rgba(251, 191, 36, 0.1);
        }

        /* UI Blocks */
        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            margin-bottom: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .btn {
            padding: 0.9rem 1.5rem;
            border-radius: 1rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-ghost {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            border-radius: 0.8rem;
        }

        /* Forms */
        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 1rem;
            color: #fff;
            margin-top: 0.5rem;
            outline: none;
            font-size: 1rem;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }

        label {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-top: 1rem;
            display: block;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
            border-radius: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1.2rem;
            color: var(--text-dim);
            font-weight: 500;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1.2rem;
            border-top: 1px solid var(--border);
        }

        /* FaceID UI */
        .face-camera-wrap {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 2rem;
            overflow: hidden;
            position: relative;
            background: #000;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            min-height: 420px;
            height: 420px;
        }

        .face-camera-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(1.1) contrast(1.05);
        }

        .face-oval {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 280px;
            border: 3px solid var(--primary);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 0 1500px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(251, 191, 36, 0.15);
            animation: ovalPulse 2s ease-in-out infinite;
        }

        @keyframes ovalPulse {

            0%,
            100% {
                border-color: var(--primary);
                box-shadow: 0 0 0 1500px rgba(0, 0, 0, 0.3), 0 0 15px rgba(251, 191, 36, 0.4);
            }

            50% {
                border-color: #fef3c7;
                box-shadow: 0 0 0 1500px rgba(0, 0, 0, 0.3), 0 0 30px rgba(251, 191, 36, 0.7);
            }
        }

        /* Badge */
        .badge {
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        /* Animation */
        .animate-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(251, 191, 36, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .diag-panel {
            margin-top: 1.5rem;
            padding: 1.2rem;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--border);
            border-radius: 1.2rem;
            font-size: 0.8rem;
            text-align: left;
            color: var(--text-dim);
            backdrop-filter: blur(10px);
        }

        .diag-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.8rem;
            margin-top: 0.8rem;
        }

        .diag-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
        }

        .status-val {
            color: var(--text);
            font-weight: 600;
        }

        .status-val.true {
            color: var(--success);
        }

        .status-val.false {
            color: var(--danger);
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 0;
            border-bottom: 1px solid var(--border);
        }

        .checklist-item:last-child {
            border-bottom: 0;
        }

        .checklist-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }

        /* New Attendance Styles */
        .att-tabs {
            display: flex;
            background: var(--surface);
            padding: 0.4rem;
            border-radius: 1.2rem;
            margin-bottom: 1.5rem;
            gap: 0.4rem;
        }

        .att-tab-btn {
            flex: 1;
            padding: 0.8rem;
            border-radius: 0.8rem;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .att-tab-btn.active {
            background: var(--primary);
            color: #000;
        }

        .student-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .student-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 1.2rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .student-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .student-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .student-code {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .att-buttons {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 0.5rem;
        }

        .btn-att {
            padding: 0.8rem 0.4rem;
            border-radius: 0.8rem;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
        }

        .btn-att.active-keldi {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }

        .btn-att.active-kechikdi {
            background: var(--warning);
            color: #fff;
            border-color: var(--warning);
        }

        .btn-att.active-kelmadi {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        .btn-att:active {
            transform: scale(0.95);
        }

        .session-info-bar {
            background: rgba(251, 191, 36, 0.05);
            border: 1px solid rgba(251, 191, 36, 0.1);
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
    </style>
</head>

    <script>
        // --- UTILS ---
        const Utils = {
            timeToMin(timeStr) {
                if (!timeStr || typeof timeStr !== 'string') return 0;
                const parts = timeStr.split(':').map(Number);
                const h = isNaN(parts[0]) ? 0 : parts[0];
                const m = isNaN(parts[1]) ? 0 : parts[1];
                return (h * 60) + m;
            },
            getAttStatus(nowTime, startTime, endTime) {
                let n = this.timeToMin(nowTime);
                let s = this.timeToMin(startTime || '00:00');
                let e = this.timeToMin(endTime || '23:59');

                if (e === 0) e = 1439;

                // Handle cross-day scenario (e.g., 23:00 to 01:00)
                if (e <= s && s > 0) {
                    if (n < s && n < 300) n += 1440; // current time is past midnight
                    e += 1440;
                } else if (n < s && s > 1000 && n < 300) {
                    n += 1440;
                }

                if (n <= s) return 'KELDI';
                if (n <= e) return 'KECHIKDI';
                return 'KELMADI';
            }
        };

        // --- CONFIG & CONSTANTS ---
        const TG_BOT_TOKEN = '8718819420:AAEsc4a5H_UcfDetGFoHh3tzXHOJAIRCD3s';
        const TG_URL = `https://api.telegram.org/bot${TG_BOT_TOKEN}`;

        // --- DATABASE AGENT (SUPABASE SYNCED) ---
        const SUPABASE_URL = 'https://wfheqfctwhmeldngvafi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_o8_4YuUyllDnnwicyphCFQ_h5edg8co';
        let supabaseClient = null;
        if (typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        const DB = {
            local: null,
            async init() {
                let validData = null;
                try {
                    if (supabaseClient) {
                        const { data, error } = await supabaseClient.from('db_state').select('data').eq('id', 'main').single();
                        if (data && data.data && data.data.meta) {
                            validData = data.data;
                        }
                    }
                } catch (e) { console.warn('Supabase fetch error, fallback to local', e); }

                if (validData) {
                    this.local = validData;
                    localStorage.setItem('chess_stabil_db', JSON.stringify(this.local));
                } else {
                    const cache = localStorage.getItem('chess_stabil_db');
                    if (cache && JSON.parse(cache).meta) {
                        this.local = JSON.parse(cache);
                        if (supabaseClient) supabaseClient.from('db_state').upsert({ id: 'main', data: this.local }).then();
                    } else {
                        this.local = {
                            meta: { lastResetMonth: new Date().getMonth(), lastTgUpdateId: 0 },
                            admins: [
                                { id: 'a1', user: 'boshadmin', pass: '123', role: 'BOSHADMIN' },
                                { id: 'a2', user: 'admin', pass: '123', role: 'ADMIN' }
                            ],
                            students: [],
                            groups: [],
                            group_members: [],
                            sessions: [],
                            attendance_records: [],
                            absences: [],
                            coin_ledger: [],
                            freeze: [],
                            requests: [],
                            settings: { monthlyLessons: 12, lessonCost: 50000, boshadminTgChatId: '' },
                            transactions: []
                        };
                        if (supabaseClient) {
                            supabaseClient.from('db_state').upsert({ id: 'main', data: this.local }).then();
                        }
                    }
                }
                this.checkMonthReset();
                this.migrate();
            },
            get() {
                if (!this.local) this.local = JSON.parse(localStorage.getItem('chess_stabil_db'));
                return this.local;
            },
            save(data) {
                if (!data.meta) data.meta = {};
                data.meta.lastModified = Date.now();
                this.local = data;
                localStorage.setItem('chess_stabil_db', JSON.stringify(data));
                if (supabaseClient) {
                    supabaseClient.from('db_state').upsert({ id: 'main', data }).then();
                }
            },
            async sync() {
                if (!supabaseClient) return;
                try {
                    const { data } = await supabaseClient.from('db_state').select('data').eq('id', 'main').single();
                    if (data && data.data && data.data.meta) {
                        const rMod = data.data.meta.lastModified || 0;
                        const lMod = this.local?.meta?.lastModified || 0;
                        if (rMod > lMod) {
                            this.local = data.data;
                            localStorage.setItem('chess_stabil_db', JSON.stringify(this.local));
                            if (!Swal.isVisible() && Engine.user) {
                                const activeLink = document.querySelector('.nav-link.active');
                                if (activeLink) Engine.navigate(activeLink.dataset.id);
                            }
                        }
                    }
                } catch (e) { }
            },
            // Mavjud DB ga settings.boshadminTgChatId yo'q bo'lsa qo'shamiz
            migrate() {
                const db = this.get();
                let changed = false;
                if (!db.meta) { db.meta = { lastResetMonth: 0, lastTgUpdateId: 0 }; changed = true; }
                if (!db.meta.lastTgUpdateId) { db.meta.lastTgUpdateId = 0; changed = true; }
                if (!db.group_members) { db.group_members = []; changed = true; }
                if (!db.sessions) { db.sessions = []; changed = true; }
                if (!db.attendance_records) {
                    db.attendance_records = db.attendance || [];
                    delete db.attendance;
                    changed = true;
                }
                if (!db.absences) { db.absences = []; changed = true; }
                if (!db.coin_ledger) { db.coin_ledger = []; changed = true; }
                if (!db.freeze) { db.freeze = []; changed = true; }
                if (!db.settings) { db.settings = { boshadminTgChatId: '' }; changed = true; }
                if (!db.settings.boshadminTgChatId) { db.settings.boshadminTgChatId = ''; changed = true; }

                if (changed && db.students) {
                    db.students.forEach(s => {
                        if (s.groupId && !db.group_members.find(x => x.studentId === s.id && x.groupId === s.groupId)) {
                            db.group_members.push({ id: crypto.randomUUID(), studentId: s.id, groupId: s.groupId });
                        }
                    });
                }

                const ba = db.admins.find(a => a.role === 'BOSHADMIN');
                if (ba && ba.user === 'root') { ba.user = 'boshadmin'; ba.pass = '123'; changed = true; }
                if (changed) this.save(db);
            },
            checkMonthReset() {
                const db = this.get();
                const currentMonth = new Date().getMonth();
                if (db.meta.lastResetMonth !== currentMonth) {
                    db.students.forEach(s => { s.balance = 0; s.monthlyPoints = 0; });
                    db.meta.lastResetMonth = currentMonth;
                    this.save(db);
                }
            }
        };

        // --- TELEGRAM BOT (LONG-POLLING) ---
        const TGBot = {
            async poll() {
                const db = DB.get();
                try {
                    const res = await fetch(`${TG_URL}/getUpdates?offset=${db.meta.lastTgUpdateId + 1}`);
                    const json = await res.json();
                    if (json.ok && json.result.length > 0) {
                        for (let update of json.result) {
                            db.meta.lastTgUpdateId = update.update_id;
                            if (update.message && update.message.text) {
                                await this.handleMessage(update.message, db);
                            }
                            if (update.callback_query) {
                                await this.handleCallback(update.callback_query, db);
                            }
                        }
                        DB.save(db);
                    }
                } catch (e) { }
            },
            async handleMessage(msg, db) {
                const chatId = msg.chat.id;
                const text = msg.text.trim();

                if (text === '/start') {
                    this.send(chatId, "Iltimos, farzandingizning 6 xonali ID (studentCode) sini kiriting:");
                    return;
                }
                const s = db.students.find(x => x.studentCode === text);
                if (s) {
                    this.send(chatId, `Ushbu o'quvchi ${s.name} ${s.surname} mi?`, JSON.stringify({
                        inline_keyboard: [[
                            { text: "✅ HA", callback_data: `C_YES_${s.id}` },
                            { text: "❌ YO'Q", callback_data: `C_NO` }
                        ]]
                    }));
                } else {
                    this.send(chatId, "XATO! Bunday ID raqamli o'quvchi topilmadi. Qaytadan kiriting yoki adminga murojaat qiling.");
                }
            },
            async handleCallback(cb, db) {
                const chatId = cb.message.chat.id;
                const data = cb.data;
                if (data.startsWith('C_YES_')) {
                    const sid = data.split('_')[2];
                    const s = db.students.find(x => x.id === sid);
                    if (s) {
                        if (!s.tgChatIds) s.tgChatIds = [];
                        if (!s.tgChatIds.includes(chatId)) s.tgChatIds.push(chatId);
                        this.send(chatId, `✅ Muvaffaqiyatli! ${s.name} ${s.surname} profiliga bog'landingiz.`);
                    }
                } else if (data === 'C_NO') {
                    this.send(chatId, "Iltimos, farzandingizning to'g'ri ID sini qaytadan kiriting:");
                }
            },
            async send(chatId, text, reply_markup = null) {
                const body = { chat_id: chatId, text, parse_mode: 'HTML' };
                if (reply_markup) body.reply_markup = reply_markup;
                await fetch(`${TG_URL}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
            },
            async notifyAttendance(studentId, sessionId, db, reasonText = 'Manual') {
                const s = db.students.find(x => x.id === studentId);
                const att = db.attendance_records.find(a => a.sessionId === sessionId && a.studentId === studentId);
                if (!s || !att || !s.tgChatIds || s.tgChatIds.length === 0) return;

                const status = att.status;
                const coins = status === 'KELDI' ? 5 : status === 'KECHIKDI' ? 3 : 0;
                const timeStr = att.checkInTime || new Date().toTimeString().slice(0, 5);

                let text = `♟️ <b>DAVOMAT</b>\n\n`;
                text += `👤 O'quvchi: <b>${s.name} ${s.surname}</b>\n`;
                text += `📍 Holat: <b>${status}</b>\n`;
                text += `🏆 Coin: <b>+${coins}</b>\n`;
                text += `📝 Sabab: ${reasonText}\n`;
                text += `⏰ Vaqt: ${timeStr}`;

                for (let cid of s.tgChatIds) {
                    await this.send(cid, text);
                }
            }
        };

            refreshAttendanceView() {
                const gid = document.getElementById('att-gid').value;
                const date = document.getElementById('att-date').value;
                if (!gid || !date) return;

                localStorage.setItem('last_att_gid', gid);

                const db = DB.get();
                const g = db.groups.find(x => x.id === gid);
                if (!g) return;

                let session = db.sessions.find(x => x.groupId === gid && x.date === date);
                if (!session) {
                    session = { id: crypto.randomUUID(), groupId: gid, date: date, startTime: g.start, endTime: g.endTime, isClosed: false };
                    db.sessions.push(session);
                    DB.save(db);
                } else if (!session.isClosed) {
                    let changed = false;
                    if (session.startTime !== g.start) { session.startTime = g.start; changed = true; }
                    if (session.endTime !== g.endTime) { session.endTime = g.endTime; changed = true; }
                    if (changed) DB.save(db);
                }

                // Session Info Bar
                const infoContainer = document.getElementById('session-info-container');
                if (infoContainer) {
                    infoContainer.innerHTML = `
                        <div class="session-info-bar">
                            <div><i data-lucide="clock" style="width:14px; height:14px; vertical-align:middle;"></i> ${session.startTime} - ${session.endTime}</div>
                            <div class="badge ${session.isClosed ? 'badge-success' : 'badge-warning'}">${session.isClosed ? 'YOPILGAN' : 'OCHIQ'}</div>
                        </div>
                    `;
                    lucide.createIcons();
                }

                const gMembers = db.group_members.filter(x => x.groupId === gid).map(x => x.studentId);
                const students = db.students.filter(x => gMembers.includes(x.id) && x.status === 'active');

                const listContainer = document.getElementById('student-list');
                if (!listContainer) return;

                if (students.length === 0) {
                    listContainer.innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text-dim);">Bu guruhda o'quvchilar yo'q</div>`;
                    return;

                    return `
                        <div class="student-card" id="card-${s.id}">
                            <div class="student-card-top">
                                <div>
                                    <div class="student-name">${s.name} ${s.surname}</div>
                                    <div class="student-code">${s.studentCode || 'ID: ' + s.id.slice(0, 8)}</div>
                                </div>
                                <div id="badge-${s.id}" class="badge ${status === 'KELDI' ? 'badge-success' : status === 'KECHIKDI' ? 'badge-warning' : status === 'KELMADI' ? 'badge-danger' : ''}" style="${status === 'BELGILANMAGAN' ? 'display:none' : ''}">
                                    ${status}
                                </div>
                            </div>
                            <div class="att-buttons">
                                <button onclick="Actions.markStudent('${session.id}', '${s.id}', 'KELDI')" class="btn-att ${status === 'KELDI' ? 'active-keldi' : ''}" id="btn-keldi-${s.id}">
                                    <span>✅</span>
                                    <span>KELDI</span>
                                </button>
                                <button onclick="Actions.markStudent('${session.id}', '${s.id}', 'KECHIKDI')" class="btn-att ${status === 'KECHIKDI' ? 'active-kechikdi' : ''}" id="btn-kechikdi-${s.id}">
                                    <span>🟨</span>
                                    <span>KECHIKDI</span>
                                </button>
                                <button onclick="Actions.markStudent('${session.id}', '${s.id}', 'KELMADI')" class="btn-att ${status === 'KELMADI' ? 'active-kelmadi' : ''}" id="btn-kelmadi-${s.id}">
                                    <span>❌</span>
                                    <span>KELMADI</span>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            switchAttTab(tab) {
                document.getElementById('tab-manual').classList.toggle('active', tab === 'manual');
                document.getElementById('tab-faceid').classList.toggle('active', tab === 'faceid');
                document.getElementById('manual-content').style.display = tab === 'manual' ? 'block' : 'none';
                document.getElementById('faceid-content').style.display = tab === 'faceid' ? 'block' : 'none';

                if (tab === 'faceid') {
                    FaceID.start();
                } else {
                    FaceID.stop(false);
                }
            },

            markStudent(sessionId, studentId, status) {
                const db = DB.get();
                const session = db.sessions.find(x => x.id === sessionId);
                if (session.isClosed && Engine.user.role !== 'BOSHADMIN') {
                    return Swal.fire('Taqiq', 'Bu dars yakunlangan! Faqat Bosh Admin o\'zgartira oladi.', 'warning');
                }

                if (status === 'KELMADI') {
                    Swal.fire({
                        title: 'Kelmadi',
                        html: `
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
                                <button id="sw-sababli" class="btn btn-ghost" style="flex-direction:column; gap:0.5rem; height:80px; border:2px solid var(--border);" onclick="this.parentElement.dataset.type='SABABLI'; this.style.borderColor='var(--success)'; document.getElementById('sw-sababsiz').style.borderColor='var(--border)';">
                                    <span style="font-size:1.5rem">📝</span>
                                    <span>Sababli</span>
                                </button>
                                <button id="sw-sababsiz" class="btn btn-ghost" style="flex-direction:column; gap:0.5rem; height:80px; border:2px solid var(--border);" onclick="this.parentElement.dataset.type='SABABSIZ'; this.style.borderColor='var(--danger)'; document.getElementById('sw-sababli').style.borderColor='var(--border)';">
                                    <span style="font-size:1.5rem">🚫</span>
                                    <span>Sababsiz</span>
                                </button>
                            </div>
                            <input id="sw-reason-text" class="form-control" placeholder="Sabab (ixtiyoriy)">
                        `,
                        showCancelButton: true,
                        confirmButtonText: 'Saqlash',
                        cancelButtonText: 'Bekor',
                        didOpen: () => {
                            // Default to SABABSIZ
                            document.getElementById('sw-sababsiz').click();
                        },
                        preConfirm: () => {
                            const type = document.querySelector('[data-type]').dataset.type;
                            const reason = document.getElementById('sw-reason-text').value;
                            return { type, reason };
                        }
                    }).then(r => {
                        if (r.isConfirmed) {
                            Actions.saveMark(sessionId, studentId, 'KELMADI', r.value.type, r.value.reason);
                        }
                    });
                } else {
                    Actions.saveMark(sessionId, studentId, status);
                }
            },

            saveMark(sessionId, studentId, status, absenceType = '', absenceReason = '', checkInTime = null) {
                const db = DB.get();
                const session = db.sessions.find(x => x.id === sessionId);
                if (!session) return;

                // UI Optimistic Update (if we are on the attendance page)
                const badge = document.getElementById(`badge-${studentId}`);
                if (badge) {
                    badge.innerText = status;
                    badge.className = `badge ${status === 'KELDI' ? 'badge-success' : status === 'KECHIKDI' ? 'badge-warning' : 'badge-danger'}`;
                    badge.style.display = 'block';

                    document.getElementById(`btn-keldi-${studentId}`)?.classList.toggle('active-keldi', status === 'KELDI');
                    document.getElementById(`btn-kechikdi-${studentId}`)?.classList.toggle('active-kechikdi', status === 'KECHIKDI');
                    document.getElementById(`btn-kelmadi-${studentId}`)?.classList.toggle('active-kelmadi', status === 'KELMADI');
                }

                const existingAtt = db.attendance_records.find(a => a.sessionId === sessionId && a.studentId === studentId);

                const getPoints = (st) => (st === 'KELDI' ? 5 : st === 'KECHIKDI' ? 3 : 0);
                const oldCoins = existingAtt ? getPoints(existingAtt.status) : 0;
                const newCoins = getPoints(status);
                const diff = newCoins - oldCoins;

                const timeStr = checkInTime || new Date().toTimeString().slice(0, 5);

                const attData = {
                    sessionId,
                    studentId,
                    status,
                    absenceType,
                    absenceReason,
                    checkInTime: timeStr,
                    timestamp: Date.now()
                };

                if (existingAtt) {
                    Object.assign(existingAtt, attData);
                } else {
                    db.attendance_records.push({ id: crypto.randomUUID(), ...attData });
                }

                if (diff !== 0) {
                    db.coin_ledger.push({
                        id: crypto.randomUUID(),
                        studentId: studentId,
                        amount: diff,
                        date: Date.now(),
                        type: 'ATTENDANCE_ADJUST',
                        note: `Davomat: ${status} (${session.date})`
                    });
                    Actions.recalcPoints(studentId, db);
                }

                // If it was KELMADI and SABABLI, create absence record
                if (status === 'KELMADI' && absenceType === 'SABABLI') {
                    if (!db.absences) db.absences = [];
                    if (!db.absences.find(x => x.sessionId === sessionId && x.studentId === studentId)) {
                        db.absences.push({
                            id: crypto.randomUUID(),
                            sessionId,
                            studentId,
                            date: session.date,
                            status: 'OPEN',
                            note: absenceReason
                        });
                    }
                } else if (db.absences) {
                    db.absences = db.absences.filter(x => !(x.sessionId === sessionId && x.studentId === studentId));
                }

                DB.save(db);

                // Notify using the saved data as source of truth
                TGBot.notifyAttendance(studentId, sessionId, db, absenceReason || 'Manual');
            },

            finishSession() {
                const gid = document.getElementById('att-gid').value;
                const date = document.getElementById('att-date').value;
                const db = DB.get();
                const session = db.sessions.find(s => s.groupId === gid && s.date === date);
                if (!session) return;

                if (session.isClosed) return Swal.fire('Dars yopilgan', 'Ushbu dars allaqachon yakunlangan.', 'info');

                const gMembers = db.group_members.filter(x => x.groupId === gid).map(x => x.studentId);
                const students = db.students.filter(x => gMembers.includes(x.id) && x.status === 'active');

                const unmarked = students.filter(s => !db.attendance_records.find(a => a.sessionId === session.id && a.studentId === s.id));

                if (unmarked.length > 0) {
                    Swal.fire({
                        title: 'Kelmaganlarni tasdiqlash',
                        html: `
                            <p style="margin-bottom:1rem; font-size:0.9rem; color:var(--text-dim);">${unmarked.length} ta o'quvchi belgilanmagan. Ularni "KELMADI" deb belgilash:</p>
                            <div id="unmarked-list" style="max-height:40vh; overflow-y:auto; text-align:left;">
                                ${unmarked.map(s => `
                                    <div class="card" style="padding:0.8rem; margin-bottom:0.5rem; display:flex; justify-content:space-between; align-items:center;">
                                        <span>${s.name}</span>
                                        <select class="form-control unmarked-select" data-sid="${s.id}" style="width:120px; margin-top:0; padding:0.4rem;">
                                            <option value="SABABSIZ">Sababsiz</option>
                                            <option value="SABABLI">Sababli</option>
                                        </select>
                                    </div>
                                `).join('')}
                            </div>
                        `,
                        showCancelButton: true,
                        confirmButtonText: 'Hammasini saqlash va yopish',
                    }).then(r => {
                        if (r.isConfirmed) {
                            const selects = document.querySelectorAll('.unmarked-select');
                            selects.forEach(sel => {
                                const sid = sel.dataset.sid;
                                const type = sel.value;
                                Actions.saveMark(session.id, sid, 'KELMADI', type, 'Dars yakunida avto-belgilash');
                            });

                            session.isClosed = true;
                            DB.save(DB.get()); // Reload from DB.get() just in case
                            Swal.fire('Yakunlandi', 'Dars muvaffaqiyatli yakunlandi.', 'success');
                            Actions.refreshAttendanceView();
                        }
                    });
                } else {
                    Swal.fire({
                        title: 'Yakunlansinmi?',
                        text: 'Barcha o\'quvchilar belgilangan. Darsni yopmoqchimisiz?',
                        icon: 'question',
                        showCancelButton: true,
                        confirmButtonText: 'Ha, dars tugadi',
                    }).then(r => {
                        if (r.isConfirmed) {
                            session.isClosed = true;
                            DB.save(db);
                            Swal.fire('Yakunlandi', 'Dars muvaffaqiyatli yakunlandi.', 'success');
                            Actions.refreshAttendanceView();
                        }
                    });
                }
            },

            recalcPoints(sid, db) {
                const s = db.students.find(x => x.id === sid);
                if (s) s.totalPoints = db.coin_ledger.filter(c => c.studentId === sid).reduce((sum, c) => sum + c.amount, 0);
            },

            addBonus(sid) {
                Swal.fire({
                    title: 'Bonus Ball Qo\'shish',
                    html: `
                        <input id="bn-amount" type="number" class="form-control" placeholder="Ball miqdori (musbat)">
                        <input id="bn-note" class="form-control" style="margin-top:1rem" placeholder="Sabab (ixtiyoriy)">
                    `,
                    showCancelButton: true
                }).then(r => {
                    if (r.isConfirmed) {
                        const amount = parseInt(document.getElementById('bn-amount').value);
                        const note = document.getElementById('bn-note').value;

                            date: Date.now(),

                            note: note
                        });

                        Actions.viewProfile(sid); // Refresh modal
                    }
                });

            editBonus(cid) {

                Swal.fire({
                    title: 'Bonusni Tahrirlash',

                        <input id="ebn-note" class="form-control" style="margin-top:1rem" value="${c.note || ''}">
                    `,

                }).then(r => {

            deleteBonus(cid) {

                    if (r.isConfirmed) {
                        const db = DB.get();
                        const c = db.coin_ledger.find(x => x.id === cid);
                        if (!c) return;
                        const sid = c.studentId;
                        db.coin_ledger = db.coin_ledger.filter(x => x.id !== cid);
                        Actions.recalcPoints(sid, db);
                        DB.save(db);
                        Actions.viewProfile(sid);
                    }
                });

            // ---- BOSHADMIN: So'rovlarni tasdiqlash ----
            approveDelete(reqId) {
                const db = DB.get();
                const req = db.requests.find(x => x.id === reqId);
                if (!req) return;
                const studentIdToDelete = req.studentId;

                Swal.fire({
                    title: '✅ Tasdiqlash',
                    text: 'O\'quvchi o\'chirilsinmi?',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: 'Ha, o\'chir',
                    cancelButtonText: 'Yo\'q'
                }).then(r => {
                    if (!r.isConfirmed) return;

                    db.students = db.students.filter(x => x.id !== studentIdToDelete);
                    db.requests = db.requests.filter(x => x.studentId !== studentIdToDelete);
                    db.attendance_records = db.attendance_records.filter(x => x.studentId !== studentIdToDelete);
                    db.group_members = db.group_members.filter(x => x.studentId !== studentIdToDelete);
                    db.coin_ledger = db.coin_ledger.filter(x => x.studentId !== studentIdToDelete);
                    db.absences = db.absences.filter(x => x.studentId !== studentIdToDelete);
                    db.freeze = db.freeze.filter(x => x.studentId !== studentIdToDelete);

                    DB.save(db);
                    Swal.fire('✅ O\'chirildi', 'O\'quvchi muvaffaqiyatli o\'chirildi.', 'success').then(() => Engine.navigate('requests'));
                });
            },

            rejectDelete(reqId) {

                const req = db.requests.find(x => x.id === reqId);

                Swal.fire('❌ Rad etildi', 'O\'chirish so\'rovi rad etildi.', 'info').then(() => Engine.navigate('requests'));
            },

                const db = DB.get();
                const me = db.admins.find(a => a.id === Engine.user.id);

                Swal.fire('✅ Yangilandi', 'Parolingiz o\'zgartirildi.', 'success');

            manageGroup(gid) {
                const db = DB.get();
                const g = db.groups.find(x => x.id === gid);
                Swal.fire({
                    title: g.name,
                    html: `
                        <input id="mg-name" class="form-control" value="${g.name}" placeholder="Nomi">

            deleteGroup(gid) {

                    if (r.isConfirmed) {
                        const db = DB.get();
                        db.groups = db.groups.filter(x => x.id !== gid);
                        db.group_members = db.group_members.filter(x => x.groupId !== gid);
                        db.sessions = db.sessions.filter(x => x.groupId !== gid);
                        db.attendance_records = db.attendance_records.filter(x => x.sessionId !== gid);
                        db.freeze = db.freeze.filter(x => x.groupId !== gid);
                        DB.save(db);
                        Engine.navigate('groups');

                });
            },

            openFreezeModal() {
                const db = DB.get();
                Swal.fire({
                    title: 'O\'quvchini Muzlatish',
                    html: `
                        <div style="text-align:left;">
                            <label>O'quvchi</label>
                            <select id="fr-sid" class="form-control" onchange="Actions.updateGroupsForFreeze()">
                                <option value="">Tanlang...</option>

                            <label style="margin-top:1rem;">Guruh</label>

                    `,
                    showCancelButton: true,
                    confirmButtonText: 'Muzlatish',

                        const gid = document.getElementById('fr-gid').value;

            updateGroupsForFreeze() {

                const db = DB.get();
                const mGids = db.group_members.filter(m => m.studentId === sid).map(m => m.groupId);
                const groups = db.groups.filter(g => mGids.includes(g.id));

            unfreeze(fid) {
                const db = DB.get();
                const f = db.freeze.find(x => x.id === fid);
                if (f) {
                    f.status = 'UNFROZEN';
                    f.freezeTo = new Date().toISOString().split('T')[0];
                    DB.save(db);
                }
                Engine.navigate('frozen');
            },

            resetAllPoints() {
                Swal.fire({ title: 'Barcha ballarni 0 qilish?', icon: 'warning', showCancelButton: true }).then(r => {
                    if (r.isConfirmed) {
                        const db = DB.get();
                        db.students.forEach(s => { s.totalPoints = 0; s.monthlyPoints = 0; });
                        db.coin_ledger = [];
                        DB.save(db);
                        Engine.navigate('rating');
                    }
                });
            },

            resolveAbsent(aid) {
                const db = DB.get();
                const a = db.absences.find(x => x.id === aid);

                DB.save(db);
                Swal.fire('✅ Saqlandi', 'BOSHADMIN Telegram Chat ID saqlandi!', 'success');
            },

            async sendTgTest() {
                const db = DB.get();
                const chatId = db.settings.boshadminTgChatId;
                if (!chatId) return Swal.fire('Xato', 'Avval Chat ID ni saqlang!', 'error');
                const msg = document.getElementById('tg-msg')?.value || '♟️ Test xabar';
                try {
                    Swal.fire({ title: 'Yuborilmoqda...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    const res = await fetch(`${TG_URL}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },

                    });
                    const json = await res.json();
                    if (json.ok) {

                    } else {
                        Swal.fire('❌ Xato', `Telegram xato: ${json.description}\n\nChat ID to'g'riligini tekshiring.`, 'error');

                } catch (e) {
                    Swal.fire('❌ Ulanish xatosi', 'Internet aloqasini tekshiring.', 'error');
                }
            },
        };

        // --- FACE ID CORE ENGINE (ULTRA OPTIMIZED) ---
        const FaceID = {
            active: false,
            stream: null,
            mode: 'user',
            candidates: [],
            currentSessionId: null,
            lastRecognized: {},

            async start() {
                const gid = document.getElementById('att-gid')?.value;
                const date = document.getElementById('att-date')?.value;
                if (!gid || !date) return Swal.fire('Xato', 'Guruh va sanani tanlang', 'error');

                const db = DB.get();
                const g = db.groups.find(x => x.id === gid);
                if (!g) return;

                let session = db.sessions.find(x => x.groupId === gid && x.date === date);
                if (!session) {
                    session = { id: crypto.randomUUID(), groupId: gid, date: date, startTime: g.start, endTime: g.endTime, isClosed: false };
                    db.sessions.push(session);
                    DB.save(db);
                } else if (!session.isClosed) {
                    let changed = false;
                    if (session.startTime !== g.start) { session.startTime = g.start || ''; changed = true; }
                    if (session.endTime !== g.endTime) { session.endTime = g.endTime || ''; changed = true; }
                    if (changed) DB.save(db);
                }

                if (session.isClosed && Engine.user.role !== 'BOSHADMIN') return Swal.fire('Taqiq', 'Bu dars yakunlangan!', 'warning');

                this.currentSessionId = session.id;

                // Load models with UI
                if (!Engine.faceModelsLoaded) {
                    document.getElementById('att-status').innerText = 'AI Modellar yuklanmoqda...';
                    await Engine.loadFaceModels();
                }

                // Cache candidates for this group
                const members = db.group_members.filter(m => m.groupId === gid).map(m => m.studentId);
                this.candidates = db.students
                    .filter(s => members.includes(s.id) && s.status === 'active' && s.faceData)
                    .map(s => ({
                        id: s.id,
                        name: s.name,
                        surname: s.surname,
                        descriptor: new Float32Array(s.faceData)
                    }));

                const noFaceList = document.getElementById('no-face-list');
                if (this.candidates.length === 0) {
                    noFaceList.style.display = 'block';
                    const list = db.students.filter(s => members.includes(s.id) && !s.faceData);
                    document.getElementById('no-face-names').innerHTML = list.length > 0 ?
                        list.map(s => `• ${s.name} ${s.surname}`).join('<br>') : 'Guruhda o‘quvchilar yo‘q';
                } else {
                    noFaceList.style.display = 'none';
                }

                document.getElementById('att-scan').style.display = 'block';
                this.active = true;

                const vid = document.getElementById('att-video');
                const statusEl = document.getElementById('att-status');
                statusEl.innerHTML = '<span style="color:var(--primary)">Kamera ishga tushmoqda...</span>';

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: this.mode,
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    vid.srcObject = stream;
                    this.stream = stream;
                    await vid.play();
                    statusEl.innerHTML = '<span style="color:var(--success)">Skanerlashga tayyor.</span>';
                } catch (e) {
                    statusEl.innerHTML = '<span style="color:var(--danger)">Kamera yoqilmadi!</span>';
                }
            },

            async identify() {
                if (!this.active || !this.stream) return;

                const btn = document.getElementById('btn-identify');
                const statusEl = document.getElementById('att-status');
                const nameEl = document.getElementById('att-name');
                const vid = document.getElementById('att-video');

                btn.disabled = true;
                statusEl.innerHTML = '<span style="color:var(--primary)">Qidirilmoqda...</span>';

                try {
                    // Use TinyFaceDetector for speed on mobile
                    const detection = await faceapi.detectSingleFace(vid, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 }))
                        .withFaceLandmarks()
                        .withFaceDescriptor();

                    if (!detection) {
                        statusEl.innerHTML = '<span style="color:var(--danger)">Yuz aniqlanmadi</span>';
                        btn.disabled = false;
                        return;
                    }

                    // Quality check: size
                    const box = detection.detection.box;
                    if (box.width < 80) {
                        statusEl.innerHTML = '<span style="color:var(--warning)">Yaqinroq keling</span>';
                        btn.disabled = false;
                        return;
                    }

                    let bestMatch = null;
                    let minDistance = 0.5; // Threshold

                    for (let s of this.candidates) {
                        const distance = faceapi.euclideanDistance(detection.descriptor, s.descriptor);
                        if (distance < minDistance) {
                            minDistance = distance;
                            bestMatch = s;
                        }
                    }

                    if (bestMatch && minDistance < 0.45) {
                        const lastRecognizedTime = this.lastRecognized[bestMatch.id] || 0;
                        if (Date.now() - lastRecognizedTime > 5000) {
                            this.processMatch(bestMatch);
                            this.lastRecognized[bestMatch.id] = Date.now();
                        } else {
                            statusEl.innerHTML = `<span style="color:var(--warning)">Biroz kuting...</span>`;
                        }
                    } else {
                        statusEl.innerHTML = '<span style="color:var(--danger)">NOTANISH / UNKNOWN</span>';
                        nameEl.innerText = '';
                    }

                } catch (e) {
                    console.error("ID Error", e);
                    statusEl.innerText = 'Xato yuz berdi';
                }

                btn.disabled = false;
            },

            processMatch(student) {
                const statusEl = document.getElementById('att-status');
                const nameEl = document.getElementById('att-name');
                const db = DB.get();
                const session = db.sessions.find(s => s.id === this.currentSessionId);
                if (!session) return;

                // Freeze Check
                const now = new Date();
                const nowStr = now.toISOString().split('T')[0];
                const freeze = (db.freeze || []).find(f =>
                    f.studentId === student.id &&
                    f.groupId === session.groupId &&
                    f.status === 'FROZEN' &&
                    nowStr >= f.freezeFrom && (!f.freezeTo || nowStr <= f.freezeTo)
                );

                if (freeze) {
                    statusEl.innerHTML = `<span style="color:var(--warning)">🛑 MUZLATILGAN: ${student.name}</span>`;
                    nameEl.innerText = student.name + ' ' + student.surname;
                    return;
                }

                // Unified status calculation
                const nowTimeStr = now.toTimeString().slice(0, 5);
                const group = db.groups.find(g => g.id === session.groupId);
                const startTime = session.startTime || group?.start || '00:00';
                const endTime = session.endTime || group?.endTime || '23:59';

                const finalStatus = Utils.getAttStatus(nowTimeStr, startTime, endTime);

                // Check double attendance
                const existing = db.attendance_records.find(a => a.sessionId === session.id && a.studentId === student.id);
                if (existing && existing.status !== 'BELGILANMAGAN') {
                    statusEl.innerHTML = `<span style="color:var(--warning)">${student.name} avval belgilangan</span>`;
                    nameEl.innerText = student.name + ' ' + student.surname;
                    return;
                }

                statusEl.innerHTML = `<span style="color:var(--success)">✅ TANILDI: ${finalStatus}</span>`;
                nameEl.innerText = student.name + ' ' + student.surname;

                Actions.saveMark(session.id, student.id, finalStatus, '', 'FaceID', nowTimeStr);
                confetti({ particleCount: 70, spread: 100, origin: { y: 0.7 } });

                // Audio feedback (if available)
                try { new Audio('https://www.soundjay.com/buttons/button-11.mp3').play(); } catch (e) { }
            },

            toggleCam() {
                this.mode = this.mode === 'user' ? 'environment' : 'user';
                this.stop(false);
                this.start();
            },

            stop(showSetup = true) {
                this.active = false;
                if (this.stream) {
                    this.stream.getTracks().forEach(t => t.stop());
                    this.stream = null;
                }
                if (showSetup) {
                    document.getElementById('att-scan').style.display = 'none';
                }
            },

            async enroll(sid) {
                if (!Engine.faceModelsLoaded) {
                    Swal.fire({ title: '🤖 AI yuklanmoqda...', allowOutsideClick: false, showConfirmButton: false, didOpen: () => Swal.showLoading() });
                    try { await Engine.loadFaceModels(); Swal.close(); }
                    catch (e) { return Swal.fire('Xato', 'Face AI yuklanmadi', 'error'); }
                }

                let curFacing = 'user';
                let enStream = null;

                const startCam = async (mode) => {
                    const v = document.getElementById('en-vid');
                    const scanBtn = Swal.getConfirmButton();
                    if (scanBtn) scanBtn.disabled = true;
                    if (enStream) enStream.getTracks().forEach(t => t.stop());
                    try {
                        enStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode, width: { ideal: 640 } } });
                        v.srcObject = enStream;
                        await v.play();
                        if (scanBtn) scanBtn.disabled = false;
                    } catch (e) { Swal.showValidationMessage('Kamera xatosi'); }
                };

                const { value: ok, isConfirmed } = await Swal.fire({
                    title: 'FaceID Ro\'yxatdan o\'tkazish',
                    width: '600px',
                    html: `
                        <div class="face-camera-wrap" style="min-height:350px; border-radius:1rem; position:relative;">
                            <video id="en-vid" autoplay muted playsinline></video>
                            <div class="face-oval"></div>
                            <button type="button" id="cam-switch" class="btn btn-ghost" style="position:absolute; bottom:1rem; right:1rem; padding:0.5rem; z-index:1000;"><i data-lucide="refresh-cw"></i></button>
                        </div>
                        <p id="en-status" style="margin-top:1rem; font-size:1.1rem; font-weight:bold; color:var(--warning);">Kamera kutilmoqda...</p>`,
                    confirmButtonText: '📸 Skanerlash va Saqlash',
                    showCancelButton: true,
                    cancelButtonText: 'Bekor',
                    didOpen: () => {
                        lucide.createIcons();
                        document.getElementById('cam-switch').onclick = () => {
                            curFacing = curFacing === 'user' ? 'environment' : 'user';
                            startCam(curFacing);
                        };
                        startCam(curFacing);
                    },
                    willClose: () => { if (enStream) enStream.getTracks().forEach(t => t.stop()); },
                    preConfirm: async () => {
                        const v = document.getElementById('en-vid');
                        document.getElementById('en-status').innerHTML = '🧬 Qayta ishlash...';
                        try {
                            const canvas = document.createElement('canvas');
                            canvas.width = 480; canvas.height = v.videoHeight * (480 / v.videoWidth);
                            canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
                            // Use TinyFaceDetector for enrollment consistency
                            const vInfo = await faceapi.detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 }))
                                .withFaceLandmarks()
                                .withFaceDescriptor();
                            if (!vInfo) { Swal.showValidationMessage('Yuz aniqlanmadi'); return false; }
                            const faces = await faceapi.extractFaces(canvas, [vInfo.detection.box]);
                            return { descriptor: Array.from(vInfo.descriptor), img: faces[0]?.toDataURL('image/jpeg', 0.8) };
                        } catch (e) { Swal.showValidationMessage('Xato: ' + e.message); return false; }
                    }
                });

                if (isConfirmed && ok) {
                    const db = DB.get();
                    const s = db.students.find(x => x.id === sid);
                    if (s) {
                        s.faceData = ok.descriptor;
                        s.faceImg = ok.img;
                        DB.save(db);
                        Swal.fire('✅ Saqlandi', '', 'success');
                        Engine.navigate('students');
                    }
                }
            }
        };

        window.onload = () => Engine.init();
    </script>
</body>
